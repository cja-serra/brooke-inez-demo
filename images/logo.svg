<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Ray templates centered at origin (will be translated to lens center) -->
    <g id="rl">
      <line x1="0" y1="-33" x2="0" y2="-80" stroke="#e8bc5a" stroke-width="1.4" stroke-linecap="round"/>
    </g>
    <g id="rs">
      <line x1="0" y1="-33" x2="0" y2="-51" stroke="#e8bc5a" stroke-width="1.4" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- 24 sun rays radiating from lens center (100,129) -->
  <g transform="translate(100,129)">
    <!-- Long rays every 30° -->
    <use href="#rl"/>
    <use href="#rl" transform="rotate(30)"/>
    <use href="#rl" transform="rotate(60)"/>
    <use href="#rl" transform="rotate(90)"/>
    <use href="#rl" transform="rotate(120)"/>
    <use href="#rl" transform="rotate(150)"/>
    <use href="#rl" transform="rotate(180)"/>
    <use href="#rl" transform="rotate(210)"/>
    <use href="#rl" transform="rotate(240)"/>
    <use href="#rl" transform="rotate(270)"/>
    <use href="#rl" transform="rotate(300)"/>
    <use href="#rl" transform="rotate(330)"/>
    <!-- Short rays offset 15° -->
    <use href="#rs" transform="rotate(15)"/>
    <use href="#rs" transform="rotate(45)"/>
    <use href="#rs" transform="rotate(75)"/>
    <use href="#rs" transform="rotate(105)"/>
    <use href="#rs" transform="rotate(135)"/>
    <use href="#rs" transform="rotate(165)"/>
    <use href="#rs" transform="rotate(195)"/>
    <use href="#rs" transform="rotate(225)"/>
    <use href="#rs" transform="rotate(255)"/>
    <use href="#rs" transform="rotate(285)"/>
    <use href="#rs" transform="rotate(315)"/>
    <use href="#rs" transform="rotate(345)"/>
  </g>

  <!-- Camera body -->
  <rect x="25" y="84" width="150" height="90" rx="8" stroke="#e8bc5a" stroke-width="1.6"/>
  <!-- Viewfinder bump (top left) -->
  <rect x="40" y="72" width="30" height="16" rx="4" stroke="#e8bc5a" stroke-width="1.6"/>
  <!-- Shutter button (top right) -->
  <circle cx="148" cy="76" r="7" stroke="#e8bc5a" stroke-width="1.6"/>

  <!-- Lens outer ring -->
  <circle cx="100" cy="129" r="29" stroke="#e8bc5a" stroke-width="1.6"/>
  <!-- Lens inner detail ring -->
  <circle cx="100" cy="129" r="22" stroke="#e8bc5a" stroke-width="0.8" stroke-dasharray="2 2.5"/>
  <!-- Boho crescent moon inside lens (offset circle) -->
  <circle cx="94" cy="126" r="13" stroke="#e8bc5a" stroke-width="1.4"/>
</svg>
